name: Android APK & AAB Derle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al (checkout)
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: NPM bagimliliklarini kur
        run: npm install

      - name: Eski android klasorunu temizle
        run: |
          if [ -d "android" ]; then
            echo "Eski android/ klasoru bulundu, siliniyor..."
            rm -rf android
          else
            echo "android/ klasoru yok, temiz baslangic."
          fi

      - name: Capacitor Android platformunu ekle
        run: npx cap add android

      - name: Uygulama ikonu ve splash screen gorsellerini uret
        run: npx capacitor-assets generate --android

      - name: Reklam kimliklerini (AdMob) projeye isle
        run: python3 scripts/patch-ads.py

      - name: Firebase google-services.json dosyasini kopyala (varsa)
        run: |
          if [ -f "resources/google-services.json" ]; then
            cp resources/google-services.json android/app/google-services.json
            echo "google-services.json android/app/ altina kopyalandi."
          else
            echo "UYARI: resources/google-services.json bulunamadi. Firebase Analytics olmadan devam ediliyor (uygulama cokmez, sadece analytics veri toplamaz)."
          fi

      - name: Web varliklarini native projeye senkronize et
        run: npx cap sync android

      - name: Derleme parametrelerini belirle
        id: params
        run: |
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: İmzalama sirlari mevcut mu kontrol et
        id: signing-check
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_ALIAS }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "[İmzalı mod] Keystore dosyasini olustur"
        if: steps.signing-check.outputs.has_signing == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Android projesini duzenle (izinler, versionCode, imzalama, kucultme)
        env:
          CI_VERSION_CODE: ${{ steps.params.outputs.version_code }}
          HAS_SIGNING_SECRETS: ${{ steps.signing-check.outputs.has_signing }}
          CI_KEYSTORE_PATH: release.keystore
          CI_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: python3 scripts/patch-android.py

      - name: Gradle ile APK ve AAB derle
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Derleme ozeti
        run: |
          if [ "${{ steps.signing-check.outputs.has_signing }}" == "true" ]; then
            echo "### ✅ Play Store'a Hazir AAB Uretildi" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ Imzalama sirlari (secrets) tanimlanmadigi icin GECICI debug anahtariyla imzalandi." >> "$GITHUB_STEP_SUMMARY"
            echo "Bu APK/AAB test icin kurulabilir ama Play Store'a YUKLENEMEZ." >> "$GITHUB_STEP_SUMMARY"
            echo "Gerekli 4 secret: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- versionCode: \`${{ steps.params.outputs.version_code }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: APK'yi is akisi ciktisi olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: clinical-guide-pro-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: AAB'yi is akisi ciktisi olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: clinical-guide-pro-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Dosyalari GitHub Release'e ekle
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
